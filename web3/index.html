<!DOCTYPE html>
<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>DevOps Identity</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Navbar -->

    <nav class="navbar">

        <div class="logo">DevOpsLab</div>

        <ul class="nav-links">

            <li>Tools</li>
            <li>Docs</li>

    <!-- Network background -->

    <canvas id="network"></canvas>
